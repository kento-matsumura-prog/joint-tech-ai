<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>joint tech AIエージェント</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif; background: #0f2035; color: #fff; height: 100vh; display: flex; flex-direction: column; }
header { background: #1a3352; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(13,148,136,0.3); }
.logo { font-size: 18px; font-weight: 700; color: #14b8a6; }
.logo span { font-size: 12px; color: #94a3b8; display: block; font-weight: 400; }
.api-area { display: flex; gap: 8px; align-items: center; }
#apikey { width: 280px; padding: 7px 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; font-size: 13px; }
#apikey:focus { outline: none; border-color: #0d9488; }
button { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
.btn-teal { background: #0d9488; color: #fff; }
.btn-teal:hover { background: #14b8a6; }
.messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.msg-user { display: flex; justify-content: flex-end; }
.msg-ai { display: flex; justify-content: flex-start; }
.bubble { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
.bubble-user { background: #0d9488; border-radius: 12px 3px 12px 12px; }
.bubble-ai { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 3px 12px 12px 12px; }
.file-btns { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.fbtn { padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid; }
.fbtn-xl { border-color: rgba(16,185,129,0.4); color: #10b981; background: rgba(16,185,129,0.08); }
.fbtn-xl:hover { background: rgba(16,185,129,0.2); }
.fbtn-wd { border-color: rgba(59,130,246,0.4); color: #60a5fa; background: rgba(59,130,246,0.08); }
.fbtn-wd:hover { background: rgba(59,130,246,0.2); }
.fbtn-cp { border-color: rgba(148,163,184,0.3); color: #94a3b8; background: rgba(148,163,184,0.05); }
.loading { display: flex; gap: 6px; padding: 14px 18px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #14b8a6; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }
.err { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #fca5a5; }
.input-area { padding: 16px 20px; background: #1a3352; border-top: 1px solid rgba(13,148,136,0.2); }
.input-row { display: flex; gap: 10px; }
#userinput { flex: 1; padding: 12px 16px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: #fff; font-size: 14px; resize: none; min-height: 48px; max-height: 140px; font-family: inherit; }
#userinput:focus { outline: none; border-color: #0d9488; }
#sendbtn { width: 48px; height: 48px; border-radius: 10px; background: #0d9488; font-size: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
#sendbtn:hover { background: #14b8a6; }
#sendbtn:disabled { background: rgba(255,255,255,0.1); cursor: not-allowed; }
.hint { font-size: 11px; color: #64748b; text-align: center; margin-top: 8px; }
.welcome { text-align: center; padding: 40px 20px; }
.welcome h2 { font-size: 22px; color: #14b8a6; margin-bottom: 12px; }
.welcome p { font-size: 14px; color: #94a3b8; line-height: 1.8; }
</style>
</head>
<body>

<header>
  <div class="logo">
    ⚡ joint tech AIエージェント
    <span>3層ナレッジ構成 powered by Claude API</span>
  </div>
  <div class="api-area">
    <input type="password" id="apikey" placeholder="Anthropic APIキーを入力（sk-ant-...）" />
    <button class="btn-teal" onclick="setKey()">設定</button>
  </div>
</header>

<div class="messages" id="msgs">
  <div class="welcome">
    <h2>⚡ joint tech AIエージェント</h2>
    <p>電気工事・管工事の専門AIです。<br>
    「ExcelやWordで作成して」と言うとファイルをダウンロードできます。<br>
    まず右上にAPIキーを入力して「設定」してください。</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="userinput" placeholder="質問・依頼を入力してください" onkeydown="if(event.ctrlKey&&event.key==='Enter'){send()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,140)+'px'"></textarea>
    <button id="sendbtn" onclick="send()">➤</button>
  </div>
  <div class="hint">Ctrl+Enter で送信 ｜ Excel・Word形式でダウンロード可能</div>
</div>

<script>
const WORKER = 'https://royal-haze-416c.kento-matsumura.workers.dev/';
let key = '';
let history = [];
let lastText = '';

function setKey() {
  const v = document.getElementById('apikey').value.trim();
  if (!v || v.includes('•')) { alert('APIキーを入力してください'); return; }
  key = v;
  document.getElementById('apikey').value = '•'.repeat(20);
  addAI('✅ APIキーを設定しました！\n\n電気工事・管工事の専門AIとして回答します。\nExcelやWordでの書類作成もできます。');
}

function addUser(t) {
  const msgs = document.getElementById('msgs');
  msgs.querySelector('.welcome')?.remove();
  msgs.innerHTML += `<div class="msg-user"><div class="bubble bubble-user">${esc(t)}</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

function addAI(t, showFile=false) {
  const msgs = document.getElementById('msgs');
  msgs.querySelector('.welcome')?.remove();
  lastText = t;
  let btns = showFile ? `<div class="file-btns">
    <button class="fbtn fbtn-xl" onclick="dlExcel()">📊 Excelで保存</button>
    <button class="fbtn fbtn-wd" onclick="dlWord()">📄 Wordで保存</button>
    <button class="fbtn fbtn-cp" onclick="copyText()">📋 コピー</button>
  </div>` : '';
  msgs.innerHTML += `<div class="msg-ai"><div><div class="bubble bubble-ai">${esc(t)}</div>${btns}</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

function addLoading() {
  const msgs = document.getElementById('msgs');
  msgs.innerHTML += `<div class="msg-ai" id="loading"><div class="bubble bubble-ai loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

async function send() {
  const input = document.getElementById('userinput');
  const text = input.value.trim();
  if (!text) return;
  if (!key) { alert('右上でAPIキーを設定してください'); return; }

  input.value = '';
  input.style.height = '48px';
  document.getElementById('sendbtn').disabled = true;

  addUser(text);
  history.push({ role: 'user', content: text });
  addLoading();

  const sys = `あなたは熊本県の電気工事・管工事専門会社「joint tech」の業務支援AIエージェントです。

## 回答の優先順位
1. 電気・管工事の専門知識（電気設備工事標準仕様書・内線規程・公共建築工事標準仕様書・建設業法・労働安全衛生法等に基づく）
2. 業界標準・法令に基づいた正確な情報
3. 実務に即した具体的な回答

## 書類作成の指示
「ExcelやWordで作成して」という依頼には以下の形式で回答：
【ファイル名】〇〇.xlsx
【内容】
（表形式や構造化された具体的な内容）

施工計画書・日報・安全書類・試験成績書・チェックリスト等を建設業実務に即して作成する。

## 絶対に行わないこと
- 工事の適法性の最終判断を断言する
- 根拠のない情報を事実として提示する`;

  try {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,
        system: sys,
        messages: history,
      })
    });

    document.getElementById('loading')?.remove();

    const data = await res.json();

    if (!res.ok) {
      const errMsg = data.error?.message || `APIエラー ${res.status}`;
      const msgs = document.getElementById('msgs');
      msgs.innerHTML += `<div class="err">❌ ${errMsg}</div>`;
      history.pop();
      return;
    }

    const aiText = data.content?.filter(b=>b.type==='text').map(b=>b.text).join('') || '回答を生成できませんでした。';
    const needFile = /excel|word|ファイル|作成|テンプレート|書類|日報|計画書|チェック/i.test(text);
    addAI(aiText, needFile);
    history.push({ role: 'assistant', content: aiText });

  } catch(e) {
    document.getElementById('loading')?.remove();
    const msgs = document.getElementById('msgs');
    msgs.innerHTML += `<div class="err">❌ 通信エラー: ${e.message}</div>`;
    history.pop();
  }

  document.getElementById('sendbtn').disabled = false;
}

function dlExcel() {
  if (!lastText) return;
  const wb = XLSX.utils.book_new();
  const fm = lastText.match(/【ファイル名】\s*(.+)/);
  const name = fm ? fm[1].replace(/\.(xlsx?|docx?)/gi,'').trim() : '資料';
  const lines = lastText.split('\n');
  const tableRows = [];
  for (const l of lines) {
    if (l.includes('|')) {
      const cells = l.split('|').map(c=>c.trim()).filter(c=>c&&!c.match(/^[-:]+$/));
      if (cells.length > 1) tableRows.push(cells);
    }
  }
  const ws = tableRows.length > 0
    ? XLSX.utils.aoa_to_sheet(tableRows)
    : XLSX.utils.aoa_to_sheet([[name],[''], ...lines.map(l=>[l])]);
  ws['!cols'] = [{wch:60}];
  XLSX.utils.book_append_sheet(wb, ws, name.substring(0,31));
  XLSX.writeFile(wb, `${name}.xlsx`);
}

function dlWord() {
  if (!lastText) return;
  const fm = lastText.match(/【ファイル名】\s*(.+)/);
  const name = fm ? fm[1].replace(/\.(xlsx?|docx?)/gi,'').trim() : '資料';
  const html = `<html><head><meta charset="utf-8"><title>${name}</title>
  <style>body{font-family:'MS Gothic',sans-serif;font-size:11pt;margin:2cm;}
  table{border-collapse:collapse;width:100%;}th{background:#0d9488;color:white;padding:6px;}td{border:1px solid #ccc;padding:5px;}</style>
  </head><body><h1>${name}</h1><p>${lastText.replace(/\n/g,'<br>')}</p>
  <p style="color:#999;font-size:9pt;margin-top:30px;">作成日：${new Date().toLocaleDateString('ja-JP')}　joint tech AIエージェント</p>
  </body></html>`;
  const blob = new Blob(['\ufeff'+html], {type:'application/msword;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${name}.doc`;
  a.click();
}

function copyText() {
  navigator.clipboard.writeText(lastText).then(()=>alert('コピーしました！'));
}
</script>
</body>
</html>
